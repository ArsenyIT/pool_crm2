<!-- gallery.html -->
{% extends "base.html" %}

{% block title %}Галерея - Swim CRM{% endblock %}

{% block content %}
<style>
    .gallery-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        background: #0a0a0a;
        overflow: hidden;
    }

    /* Фоновое изображение с эффектом появления из размытия */
    .gallery-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .bg-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        filter: blur(30px);
        transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
    }

    .bg-image.loaded {
        opacity: 1;
        filter: blur(0px);
    }

    /* Тёмная накладка для читаемости */
    .gallery-background::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 2;
        pointer-events: none;
    }

    /* Центральное изображение (увеличенное) */
    .gallery-main {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        max-width: 75%;
        max-height: 70%;
        z-index: 10;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 255, 255, 0.2);
        opacity: 0;
        filter: blur(20px);
        transition: opacity 0.5s ease, filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gallery-main.show {
        opacity: 1;
        filter: blur(0px);
    }

    /* Карусель выбора (как меню PS1) */
    .gallery-carousel {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        border-radius: 60px;
        width: fit-content;
        max-width: 90%;
        padding: 12px 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .carousel-wrapper {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .carousel-nav-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        color: white;
        font-size: 1.3rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .carousel-nav-btn:hover {
        background: rgba(59, 130, 246, 0.6);
        transform: scale(1.05);
    }

    .carousel-items {
        flex: 1;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
        scrollbar-width: thin;
        scrollbar-color: rgba(59,130,246,0.6) rgba(255,255,255,0.1);
        display: flex;
        gap: 12px;
        padding: 5px 0;
        max-width: 600px;
    }

    .carousel-items::-webkit-scrollbar {
        height: 5px;
    }

    .carousel-items::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }

    .carousel-items::-webkit-scrollbar-thumb {
        background: #3b82f6;
        border-radius: 10px;
    }

    .carousel-item {
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        opacity: 0.6;
    }

    .carousel-item.active {
        border-color: #3b82f6;
        opacity: 1;
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }

    .carousel-item:hover {
        opacity: 0.9;
        transform: scale(1.02);
    }

    .carousel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Кнопка выхода */
    .gallery-exit-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 30;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 10px 22px;
        border-radius: 40px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .gallery-exit-btn:hover {
        background: #ef4444;
        transform: scale(1.05);
    }

    /* Информация о текущем изображении */
    .gallery-info {
        position: fixed;
        bottom: 130px;
        left: 20px;
        z-index: 15;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        padding: 6px 14px;
        border-radius: 30px;
        color: white;
        font-size: 0.8rem;
        pointer-events: none;
        font-family: monospace;
    }

    /* Индикатор прокрутки */
    .scroll-indicator {
        position: fixed;
        bottom: 130px;
        right: 20px;
        z-index: 15;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        padding: 6px 12px;
        border-radius: 30px;
        color: white;
        font-size: 0.7rem;
        display: flex;
        align-items: center;
        gap: 6px;
        animation: fadeOut 3s ease forwards;
        pointer-events: none;
    }

    @keyframes fadeOut {
        0% { opacity: 1; }
        70% { opacity: 1; }
        100% { opacity: 0; visibility: hidden; }
    }

    /* Загрузчик */
    .gallery-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 50;
        background: rgba(0,0,0,0.7);
        border-radius: 50%;
        padding: 20px;
        display: none;
    }

    .gallery-loader.show {
        display: block;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>

<div class="gallery-container">
    <!-- Фоновое изображение -->
    <div class="gallery-background">
        <img id="bgImage" class="bg-image" alt="Background">
    </div>

    <!-- Центральное изображение -->
    <img id="mainImage" class="gallery-main" alt="Gallery image">

    <!-- Информация -->
    <div class="gallery-info" id="imageInfo">Загрузка...</div>

    <!-- Индикатор прокрутки колесиком -->
    <div class="scroll-indicator">
        <i class="fas fa-mouse"></i>
        <span>Крути колёсико</span>
    </div>

    <!-- Кнопка выхода -->
    <a href="/" class="gallery-exit-btn">
        <i class="fas fa-times-circle"></i>
        Выйти из галереи
    </a>

    <!-- Карусель -->
    <div class="gallery-carousel">
        <div class="carousel-wrapper">
            <button class="carousel-nav-btn" id="prevBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="carousel-items" id="carouselItems">
                <!-- Сюда будут загружены миниатюры -->
                <div style="text-align: center; width: 100%; color: white;">Загрузка изображений...</div>
            </div>
            <button class="carousel-nav-btn" id="nextBtn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Загрузчик -->
    <div class="gallery-loader" id="loader">
        <div class="spinner"></div>
    </div>
</div>

<script>
    let images = [];
    let currentIndex = 0;
    let isLoading = false;

    // Элементы DOM
    const bgImage = document.getElementById('bgImage');
    const mainImage = document.getElementById('mainImage');
    const carouselContainer = document.getElementById('carouselItems');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const imageInfo = document.getElementById('imageInfo');
    const loader = document.getElementById('loader');

    // Загрузка списка изображений
    async function loadImages() {
        try {
            const response = await fetch('/api/gallery/images');
            if (response.ok) {
                const data = await response.json();
                images = data.images;
                if (images.length > 0) {
                    renderCarousel();
                    loadImage(0);
                } else {
                    carouselContainer.innerHTML = '<div style="color: white; text-align: center;">Нет изображений в галерее</div>';
                    imageInfo.textContent = 'Нет изображений';
                }
            } else {
                carouselContainer.innerHTML = '<div style="color: white; text-align: center;">Ошибка загрузки изображений</div>';
            }
        } catch (error) {
            console.error('Ошибка загрузки галереи:', error);
            carouselContainer.innerHTML = '<div style="color: white; text-align: center;">Ошибка загрузки</div>';
        }
    }

    // Рендер карусели
    function renderCarousel() {
        carouselContainer.innerHTML = '';
        images.forEach((img, idx) => {
            const item = document.createElement('div');
            item.className = 'carousel-item';
            if (idx === currentIndex) item.classList.add('active');
            item.innerHTML = `<img src="${img}" alt="Thumbnail">`;
            item.onclick = () => loadImage(idx);
            carouselContainer.appendChild(item);
        });
        scrollToActiveItem();
    }

    // Прокрутка карусели к активному элементу
    function scrollToActiveItem() {
        const activeItem = carouselContainer.querySelector('.carousel-item.active');
        if (activeItem) {
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }

    // Загрузка изображения по индексу с эффектом размытия
    function loadImage(index) {
        if (index < 0) index = 0;
        if (index >= images.length) index = images.length - 1;
        if (index === currentIndex && mainImage.classList.contains('show')) return;

        currentIndex = index;

        // Обновляем активный класс в карусели
        document.querySelectorAll('.carousel-item').forEach((item, i) => {
            if (i === currentIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
        scrollToActiveItem();

        const imgUrl = images[currentIndex];
        const fileName = imgUrl.split('/').pop();

        // Показываем информацию
        imageInfo.innerHTML = `<i class="fas fa-image"></i> ${fileName} (${currentIndex + 1}/${images.length})`;

        // Эффект размытого появления на фоне
        // Сначала убираем класс loaded у фона
        bgImage.classList.remove('loaded');

        // Загружаем новое фоновое изображение
        const tempBgImg = new Image();
        tempBgImg.onload = () => {
            bgImage.src = imgUrl;
            // Небольшая задержка для плавности
            setTimeout(() => {
                bgImage.classList.add('loaded');
            }, 50);
        };
        tempBgImg.src = imgUrl;

        // Эффект для центрального изображения
        // Скрываем текущее с анимацией
        mainImage.classList.remove('show');

        // Загружаем новое центральное изображение
        const tempMainImg = new Image();
        tempMainImg.onload = () => {
            mainImage.src = imgUrl;
            // Показываем с эффектом появления из размытия
            setTimeout(() => {
                mainImage.classList.add('show');
            }, 100);
        };
        tempMainImg.src = imgUrl;
    }

    // Переключение на следующее изображение
    function nextImage() {
        if (currentIndex < images.length - 1) {
            loadImage(currentIndex + 1);
        } else if (currentIndex === images.length - 1 && images.length > 0) {
            loadImage(0); // Зацикливание
        }
    }

    // Переключение на предыдущее изображение
    function prevImage() {
        if (currentIndex > 0) {
            loadImage(currentIndex - 1);
        } else if (currentIndex === 0 && images.length > 0) {
            loadImage(images.length - 1); // Зацикливание
        }
    }

    // Обработка колесика мыши
    function handleWheel(e) {
        e.preventDefault();
        if (e.deltaY > 0) {
            nextImage();
        } else {
            prevImage();
        }
    }

    // Обработка клавиш
    function handleKeydown(e) {
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextImage();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevImage();
        } else if (e.key === 'Escape') {
            window.location.href = '/';
        }
    }

    // Добавляем обработчики событий
    prevBtn.addEventListener('click', prevImage);
    nextBtn.addEventListener('click', nextImage);

    // Блокируем прокрутку страницы и добавляем обработчик колесика
    document.body.style.overflow = 'hidden';
    document.addEventListener('wheel', handleWheel, { passive: false });
    document.addEventListener('keydown', handleKeydown);

    // Обработчик выхода - убираем блокировку
    window.addEventListener('beforeunload', () => {
        document.body.style.overflow = '';
        document.removeEventListener('wheel', handleWheel);
    });

    // Запускаем загрузку
    loadImages();
</script>
{% endblock %}
